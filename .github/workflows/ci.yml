name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      shell: ${{ steps.filter.outputs.shell }}
      text: ${{ steps.filter.outputs.text }}
      drawing: ${{ steps.filter.outputs.drawing }}
      files: ${{ steps.filter.outputs.files }}
      docker: ${{ steps.filter.outputs.docker }}

    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared:
              - 'package.json'
              - 'bun.lock'
              - 'biome.json'
              - 'scripts/check-repo-shape.ts'
              - 'tsconfig*.json'
              - 'playwright.config.ts'
              - 'scripts/run-playwright.sh'
              - 'apps/api/**'
              - 'apps/web/src/main.tsx'
              - 'apps/web/src/styles/**'
              - 'packages/core/**'
              - 'packages/protocol/**'
              - 'apps/api/src/features/realtime/**'
            shell:
              - 'apps/web/src/routes/**'
              - 'apps/api/src/features/shell/**'
              - 'apps/api/src/features/tree/**'
              - 'tests/e2e/shell/**'
              - 'tests/docker/shell/**'
            text:
              - 'apps/api/src/features/text/**'
              - 'tests/e2e/text/**'
              - 'tests/docker/text/**'
            drawing:
              - 'apps/api/src/features/drawing/**'
              - 'tests/e2e/drawing/**'
              - 'tests/docker/drawing/**'
            files:
              - 'apps/api/src/features/files/**'
              - 'tests/e2e/files/**'
              - 'tests/docker/files/**'
            docker:
              - '.dockerignore'
              - 'Dockerfile'
              - 'compose.local.yml'
              - 'README.md'
              - 'scripts/docker-local.sh'
              - '.github/workflows/ci.yml'

  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fast checks
        run: bun run check

      - name: Test suite
        run: bun run test

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes, checks]
    if: github.ref == 'refs/heads/main' || needs.changes.outputs.shared == 'true' || needs.changes.outputs[matrix.lane] == 'true'
    strategy:
      fail-fast: false
      matrix:
        lane: [shell, text, drawing, files]

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bun x playwright install --with-deps chromium

      - name: Smoke tests
        run: bun run smoke:${{ matrix.lane }}

  docker_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, checks]
    if: github.ref == 'refs/heads/main' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs[matrix.lane] == 'true'
    strategy:
      fail-fast: false
      matrix:
        lane: [shell, text, drawing, files]

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bun x playwright install --with-deps chromium

      - name: Docker smoke
        run: bun run docker:smoke:${{ matrix.lane }}
