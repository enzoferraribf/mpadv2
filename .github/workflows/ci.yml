name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fast checks
        run: bun run check

      - name: Test suite
        run: bun run test

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: checks

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bun x playwright install --with-deps chromium

      - name: Smoke tests
        run: bun run smoke

  docker_changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}

    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - '.dockerignore'
              - 'Dockerfile'
              - 'compose.local.yml'
              - 'DEPLOY.md'
              - 'scripts/docker-local.sh'
              - '.github/workflows/ci.yml'

  docker_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [checks, smoke, docker_changes]
    if: github.ref == 'refs/heads/main' || needs.docker_changes.outputs.docker == 'true'

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bun x playwright install --with-deps chromium

      - name: Docker smoke
        run: bun run docker:smoke
