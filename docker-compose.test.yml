services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mmpad_test
      POSTGRES_USER: mmpad
      POSTGRES_PASSWORD: mmpad
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmpad -d mmpad_test"]
      interval: 1s
      timeout: 5s
      retries: 60
