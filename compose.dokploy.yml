services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - mpad-postgres-data:/var/lib/postgresql/data
    networks:
      - mpad-internal

  api:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      CLIENT_IP_SOURCE: ${CLIENT_IP_SOURCE:-cloudflare}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MAX_RELATED_PADS: ${MAX_RELATED_PADS:-100}
      MAX_ROOM_CLIENTS: ${MAX_ROOM_CLIENTS:-32}
      NODE_ENV: production
      PORT: 4000
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_WS_UPGRADES: ${RATE_LIMIT_WS_UPGRADES:-60}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
    expose:
      - "4000"
    networks:
      - mpad-internal
      - dokploy-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  mpad-postgres-data:

networks:
  mpad-internal:
    internal: true
  dokploy-network:
    external: true
