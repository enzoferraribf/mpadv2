services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${MPAD_LOCAL_POSTGRES_DB:-mpad_local}
      POSTGRES_PASSWORD: ${MPAD_LOCAL_POSTGRES_PASSWORD:-mpad}
      POSTGRES_USER: ${MPAD_LOCAL_POSTGRES_USER:-mpad}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 1s
      timeout: 5s
      retries: 60
    ports:
      - "${MPAD_LOCAL_POSTGRES_PORT:-15432}:5432"
    volumes:
      - mpad-local-postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CLIENT_ORIGIN: http://127.0.0.1:${MPAD_LOCAL_CLIENT_PORT:-4174}
      CLIENT_IP_SOURCE: direct
      DATABASE_URL: postgres://${MPAD_LOCAL_POSTGRES_USER:-mpad}:${MPAD_LOCAL_POSTGRES_PASSWORD:-mpad}@postgres:5432/${MPAD_LOCAL_POSTGRES_DB:-mpad_local}
      PORT: 4000
      TRUST_PROXY_HEADERS: false
    ports:
      - "${MPAD_LOCAL_APP_PORT:-13000}:4000"

volumes:
  mpad-local-postgres-data:
