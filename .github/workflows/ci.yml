name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Checks and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fast checks
        run: bun run check

      - name: Test suite
        run: bun run test

  e2e:
    name: E2E (${{ matrix.lane }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [checks]
    strategy:
      fail-fast: false
      matrix:
        lane: [shell, text, drawing, files]

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bun x playwright install --with-deps chromium

      - name: E2E tests
        run: bun run smoke:${{ matrix.lane }}

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.lane }}-artifacts
          path: |
            .tmp/playwright/e2e/${{ matrix.lane }}
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 14

  docker_smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [checks]

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bun x playwright install --with-deps chromium

      - name: Docker smoke
        run: bun run docker:smoke

      - name: Upload Docker smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-artifacts
          path: |
            .tmp/playwright/docker
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 14
