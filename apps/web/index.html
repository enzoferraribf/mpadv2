<html lang="en" suppressHydrationWarning>
    <head>
        <meta charset="UTF-8" />

            content="Create collaborative markdown, drawing, and related pads in realtime."
        />
        <meta name="application-name" content="MPAD" />
        <meta name="theme-color" content="#1c1b18" />
        <meta name="robots" content="max-image-preview:large" />
        <link rel="canonical" href="https://missopad.com/" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="/assets/favicon.svg"
            sizes="any"
        />
        <link
            rel="icon"
            type="image/png"
            href="/favicon-96x96.png"
            sizes="96x96"
        />
        <link rel="shortcut icon" href="/favicon.ico" />
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="MPAD" />
        <meta property="og:locale" content="en_US" />
        <meta
            property="og:title"
            content="MPAD - Realtime collaborative pads"
        />
        <meta
            property="og:description"
            content="Create collaborative markdown, drawing, and related pads in realtime."
        />
        <meta property="og:url" content="https://missopad.com/" />
        <meta
            property="og:image"
            content="https://missopad.com/assets/mpad-brand-card.png"
        />
        <meta
            property="og:image:secure_url"
            content="https://missopad.com/assets/mpad-brand-card.png"
        />
        <meta property="og:image:type" content="image/png" />

        <meta property="og:image:height" content="630" />
        <meta
            property="og:image:alt"
            content="MPAD realtime collaborative pads"
        />
        <meta name="twitter:card" content="summary_large_image" />
        <meta
            name="twitter:title"
            content="MPAD - Realtime collaborative pads"
        />
        <meta
            name="twitter:description"
            content="Create collaborative markdown, drawing, and related pads in realtime."
        />
        <meta
            name="twitter:image"
            content="https://missopad.com/assets/mpad-brand-card.png"
        />
        <meta
            name="twitter:image:alt"
            content="MPAD realtime collaborative pads"
        />
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebPage",
                "name": "MPAD",
                "url": "https://missopad.com/",
                "description": "Create collaborative markdown, drawing, and related pads in realtime.",
                "primaryImageOfPage": "https://missopad.com/assets/mpad-brand-card.png"
            }
        </script>
        <script>
            ;(() => {
                const root = document.documentElement
                let stored
                try {
                    stored = localStorage.getItem('mpad.theme')
                } catch {}
                const theme =
                    stored === 'light' || stored === 'dark' ? stored : 'system'
                const resolved =
                    theme === 'system'
                        ? matchMedia('(prefers-color-scheme: dark)').matches
                            ? 'dark'
                            : 'light'
                        : theme

                root.classList.remove('light', 'dark')
                root.classList.add(resolved)
                root.style.colorScheme = resolved
            })()
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
